name: Deploy Hugo site to Pages

on:
  push:
    branches: ["main"]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive # 確保抓到 Reimu 主題內容
          fetch-depth: 0

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: 'latest'
          extended: true # <--- 這是解決 SCSS 報錯的唯一關鍵！

      - name: Build
        run: hugo --minify

      - name: Deploy
        uses: actions/deploy-pages@v4